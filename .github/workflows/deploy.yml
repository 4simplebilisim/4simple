name: Wix Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wix CLI
        run: npm install -g @wix/cli

      - name: Wix Publish
        run: CI=true wix publish --force
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
